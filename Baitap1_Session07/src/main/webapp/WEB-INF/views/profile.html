<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật thông tin Nhà hàng</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 120px; }
    </style>
</head>
<body>
<h2>Cập nhật hồ sơ nhà hàng</h2>

<form th:action="@{/merchant/update-profile}" th:object="${restaurantProfile}" method="POST">

    <div class="form-group">
        <label>Tên cửa hàng:</label>
        <input type="text" th:field="*{name}" placeholder="Nhập tên quán..." />
    </div>

    <div class="form-group">
        <label>Số điện thoại:</label>
        <input type="text" th:field="*{phone}" placeholder="Nhập số điện thoại..." />
    </div>

    <div class="form-group">
        <label>Đang mở cửa:</label>
        <input type="checkbox" th:field="*{active}" />
    </div>

    <button type="submit">Lưu thông tin</button>
</form>
</body>
</html>
